<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfinder - Option B: Toolbar + Status</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #06080d; --bg2: #0d1117; --bg3: #161b22; --bg4: #1c2333;
    --border: #1a2744; --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
    --cyan: #00d4aa; --purple: #7b61ff; --amber: #f0b429; --red: #ff6b6b; --blue: #58a6ff;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
  .layout { display: flex; flex-direction: column; height: 100%; }

  /* Toolbar */
  .toolbar {
    background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .toolbar-row {
    display: flex; align-items: center; padding: 0 16px; height: 44px; gap: 10px;
  }
  .toolbar-row + .toolbar-row { border-top: 1px solid rgba(26,39,68,0.4); }
  .logo { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--cyan); }
  .logo span { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .tb-select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 6px; font-size: 12px; font-family: 'Inter', sans-serif;
    outline: none;
  }
  .tb-select:focus { border-color: var(--cyan); }
  .tb-input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 8px; border-radius: 6px; font-size: 12px; width: 60px; text-align: center;
    font-family: 'JetBrains Mono', monospace; outline: none;
  }
  .tb-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .tb-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; font-family: 'JetBrains Mono', monospace; }
  .btn {
    padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border: 1px solid;
  }
  .btn-gen { background: rgba(0,212,170,0.1); border-color: var(--cyan); color: var(--cyan); }
  .btn-gen:hover { background: rgba(0,212,170,0.2); }
  .btn-sol { background: rgba(123,97,255,0.1); border-color: var(--purple); color: var(--purple); }
  .btn-sol:hover { background: rgba(123,97,255,0.2); }
  .btn-rst { background: var(--bg3); border-color: var(--border); color: var(--text2); }
  .btn-rst:hover { background: var(--bg4); color: var(--text); }
  .tb-speed { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .tb-speed input { width: 90px; accent-color: var(--cyan); }
  .tb-speed-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--cyan); min-width: 30px; }

  /* Canvas */
  .canvas-area { flex: 1; position: relative; background: var(--bg); display: flex; align-items: center; justify-content: center; }
  .maze-demo {
    width: 520px; height: 520px; border: 2px solid var(--cyan); border-radius: 2px;
    position: relative; overflow: hidden;
    box-shadow: 0 0 60px rgba(0,212,170,0.05), inset 0 0 80px rgba(0,212,170,0.01);
  }
  .maze-demo canvas { width: 100%; height: 100%; }

  /* Playback */
  .playback {
    height: 50px; background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0;
  }
  .pb { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    background: var(--bg3); border: 1px solid var(--border); color: var(--text2); cursor: pointer;
    font-size: 13px; transition: all 0.15s; }
  .pb:hover { background: var(--bg4); color: var(--text); }
  .pb.main { background: rgba(0,212,170,0.12); border-color: var(--cyan); color: var(--cyan); width: 64px; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  /* Status bar */
  .statusbar {
    height: 80px; background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 0; flex-shrink: 0;
  }
  .stat {
    flex: 1; padding: 8px 16px; border-right: 1px solid var(--border); text-align: center;
  }
  .stat:last-child { border-right: none; }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .stat-value { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
  .stat-delta { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }

  .variant-badge {
    position: fixed; top: 12px; right: 16px; background: var(--purple); color: #fff;
    padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 13px; z-index: 100;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
<div class="variant-badge">B - TOOLBAR</div>
<div class="layout">
  <div class="toolbar">
    <div class="toolbar-row">
      <div class="logo">&gt; pathfinder<span>_</span></div>
      <div class="tb-sep"></div>
      <div class="tb-label">gen</div>
      <select class="tb-select"><option>DFS Backtracker</option><option>Kruskal</option><option>Prim</option><option>Eller</option><option>Wilson</option></select>
      <div class="tb-sep"></div>
      <div class="tb-label">size</div>
      <input class="tb-input" value="30"> <span style="color:var(--text3)">x</span> <input class="tb-input" value="30">
      <div class="tb-sep"></div>
      <div class="tb-label">seed</div>
      <input class="tb-input" value="42" style="width:70px">
      <div class="tb-speed">
        <div class="tb-label">speed</div>
        <input type="range" min="0" max="100" value="50">
        <div class="tb-speed-val">50%</div>
      </div>
    </div>
    <div class="toolbar-row">
      <div class="tb-label">solve</div>
      <select class="tb-select"><option>BFS</option><option>DFS</option><option>A*</option><option>Dijkstra</option><option>Greedy BFS</option><option>Wall Follower</option><option>Tremaux</option><option>Dead-End Fill</option></select>
      <div class="tb-sep"></div>
      <button class="btn btn-gen">Generate</button>
      <button class="btn btn-sol">Solve</button>
      <button class="btn btn-rst">Reset</button>
    </div>
  </div>

  <div class="canvas-area">
    <div class="maze-demo"><canvas id="maze"></canvas></div>
  </div>

  <div class="playback">
    <div class="pb">|&laquo;</div>
    <div class="pb">&laquo;</div>
    <div class="pb main">&#9654; PLAY</div>
    <div class="pb">&raquo;</div>
    <div class="pb">&raquo;|</div>
  </div>

  <div class="statusbar">
    <div class="stat"><div class="stat-label">Steps</div><div class="stat-value" style="color:var(--cyan)">1,247</div><div class="stat-delta">+23/frame</div></div>
    <div class="stat"><div class="stat-label">Visited</div><div class="stat-value" style="color:var(--purple)">892</div><div class="stat-delta">89.2%</div></div>
    <div class="stat"><div class="stat-label">Path</div><div class="stat-value" style="color:#34d399">47</div><div class="stat-delta">optimal</div></div>
    <div class="stat"><div class="stat-label">Efficiency</div><div class="stat-value" style="color:var(--amber)">78%</div><div class="stat-delta">path/visited</div></div>
    <div class="stat"><div class="stat-label">Dead Ends</div><div class="stat-value" style="color:var(--blue)">34</div><div class="stat-delta">3.4%</div></div>
    <div class="stat"><div class="stat-label">Time</div><div class="stat-value" style="color:var(--text2)">2.1ms</div><div class="stat-delta">wasm</div></div>
  </div>
</div>
<script>
const c = document.getElementById('maze');
const dpr = window.devicePixelRatio || 1;
c.width = 520 * dpr; c.height = 520 * dpr;
const ctx = c.getContext('2d');
ctx.scale(dpr, dpr);
const S = 520/30, W = 30, H = 30;
ctx.fillStyle = '#06080d'; ctx.fillRect(0, 0, 520, 520);
for (let r = 0; r < H; r++) for (let col = 0; col < W; col++) {
  const x = col*S, y = r*S, rnd = Math.random();
  if (r===0&&col===0) ctx.fillStyle='#00d4aa';
  else if (r===H-1&&col===W-1) ctx.fillStyle='#ff6b6b';
  else if (rnd<0.12) ctx.fillStyle='rgba(0,212,170,0.3)';
  else if (rnd<0.45) ctx.fillStyle='rgba(123,97,255,0.1)';
  else if (rnd<0.55) ctx.fillStyle='rgba(88,166,255,0.12)';
  else ctx.fillStyle='#080c14';
  ctx.fillRect(x,y,S,S);
}
ctx.strokeStyle='#15253d'; ctx.lineWidth=1;
for (let r=0;r<H;r++) for(let col=0;col<W;col++){
  const x=col*S+0.5,y=r*S+0.5,w=Math.random()<0.35?0xF:(Math.random()*16)|0;
  if(w&1){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+S,y);ctx.stroke();}
  if(w&2){ctx.beginPath();ctx.moveTo(x+S,y);ctx.lineTo(x+S,y+S);ctx.stroke();}
  if(w&4){ctx.beginPath();ctx.moveTo(x,y+S);ctx.lineTo(x+S,y+S);ctx.stroke();}
  if(w&8){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+S);ctx.stroke();}
}
ctx.strokeStyle='#00d4aa'; ctx.lineWidth=2; ctx.strokeRect(1,1,518,518);
ctx.strokeStyle='#34d399'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.beginPath();
let px=S/2,py=S/2; ctx.moveTo(px,py);
for(let i=0;i<25;i++){px+=(Math.random()>0.3?1:0)*S;py+=(Math.random()>0.5?1:0)*S;px=Math.min(px,29*S+S/2);py=Math.min(py,29*S+S/2);ctx.lineTo(px,py);}
ctx.stroke();
</script>
</body>
</html>
